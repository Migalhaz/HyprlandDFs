# ===========================================================
# WINDOWS AND LAYER RULES (SHARED)
# ===========================================================

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class *

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland on, match:float on, match:fullscreen off, match:pin off

# Windows to start floating
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$

